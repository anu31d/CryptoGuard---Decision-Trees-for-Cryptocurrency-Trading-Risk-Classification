name: 🚀 Deploy CryptoGuard Website

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Prepare Site
        run: |
          mkdir -p public
          mkdir -p public/data

          cp project/index.html public/
          cp project/styles.css public/
          cp project/script.js public/

          find project -type f \( -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" -o -name "*.svg" \) -exec cp {} public/ \;

          cp -r data/* public/data/

          touch public/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
